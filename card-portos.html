<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Card Portos</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    width: 100%; height: 100%;
    background: transparent;
  }

  .card {
    position: relative;
    width: 100%;
    height: 100vh;
    border-radius: 18px;
    overflow: hidden;

    background:
      radial-gradient(ellipse 95% 80% at 92% 100%, rgba(0,120,200,0.95) 0%, rgba(0,80,160,0.55) 30%, transparent 60%),
      radial-gradient(ellipse 70% 60% at 0%  90%,  rgba(0,20,60,0.80)   0%, transparent 55%),
      radial-gradient(ellipse 55% 45% at 75% 8%,   rgba(30,120,230,0.22) 0%, transparent 55%),
      radial-gradient(ellipse 80% 50% at 30% 50%,  rgba(0,50,120,0.18)  0%, transparent 70%),
      #010810;

    display: flex;
    flex-direction: column;
    justify-content: space-between;
    padding: clamp(18px, 5vh, 36px) clamp(18px, 5vw, 32px) clamp(20px, 5.5vh, 40px);
    border: 1px solid rgba(0, 104, 176, 0.14);
  }

  /* grain de textura */
  .card::after {
    content: '';
    position: absolute;
    inset: 0;
    z-index: 1;
    pointer-events: none;
    border-radius: 18px;
    opacity: 0.038;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.82' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
    background-size: 160px 160px;
  }

  /* brilho interno */
  .glow {
    position: absolute;
    bottom: -30px;
    right: -30px;
    width: 60%;
    height: 60%;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(0,140,220,0.28) 0%, transparent 70%);
    filter: blur(40px);
    z-index: 0;
    pointer-events: none;
  }



  .top, .bottom {
    position: relative;
    z-index: 3;
  }

  /* ── LABEL — Calibri, discreto ── */
  .modal-label {
    font-family: 'Calibri', 'Gill Sans', 'Gill Sans MT', 'Trebuchet MS', sans-serif;
    font-size: clamp(11px, 2vh, 18px);
    font-weight: 700;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: rgba(140, 200, 255, 0.55);
  }

  /* ── NÚMERO — Avenir Next, muito grande ── */
  .number {
    font-family: 'Avenir Next', 'Avenir', 'Century Gothic', 'Trebuchet MS', sans-serif;
    font-size: clamp(72px, 22vh, 180px);
    font-weight: 800;
    color: #ffffff;
    line-height: 0.85;
    letter-spacing: -0.05em;
  }

  .number .unit {
    font-family: 'Avenir Next', 'Avenir', 'Century Gothic', 'Trebuchet MS', sans-serif;
    font-size: clamp(30px, 8vh, 72px);
    font-weight: 600;
    letter-spacing: -0.02em;
    vertical-align: super;
    line-height: 0;
    color: rgba(255, 255, 255, 0.78);
  }

  /* ── DESCRIÇÃO — Avenir Next, destaque secundário ── */
  .desc {
    font-family: 'Avenir Next', 'Avenir', 'Century Gothic', 'Trebuchet MS', sans-serif;
    font-size: clamp(16px, 4vh, 32px);
    font-weight: 400;
    color: rgba(255, 255, 255, 0.55);
    line-height: 1.40;
    margin-top: clamp(10px, 2.5vh, 20px);
    max-width: 85%;
  }
</style>
</head>
<body>

<div class="card">
  <div class="glow"></div>
  <div class="top">
    <span class="modal-label">Portos</span>
  </div>

  <div class="bottom">
    <div class="number">9<span class="unit">%</span></div>
    <p class="desc">da movimentação portuária brasileira</p>
  </div>
</div>

</body>
</html>
