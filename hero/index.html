<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Atlas Hero</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      background: transparent;
      overflow: hidden;
    }

    video {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      pointer-events: none;
    }
  </style>
</head>
<body>
  <video id="heroVideo" autoplay loop muted playsinline preload="auto">
    <source src="hero.mp4" type="video/mp4">
  </video>

  <script>
    const video = document.getElementById('heroVideo');

    // Garante que está mutado (requisito do autoplay em iframe)
    video.muted = true;

    // Tenta dar play assim que a página carrega
    window.addEventListener('load', () => {
      video.play().catch(() => {
        // Se falhar, tenta novamente no primeiro clique/toque do usuário
        document.addEventListener('click', () => video.play(), { once: true });
        document.addEventListener('touchstart', () => video.play(), { once: true });
      });
    });
  </script>
</body>
</html>
