<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Atlas Hero</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; background: transparent; overflow: hidden; }
    video {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      pointer-events: none;
    }
  </style>
</head>
<body>
  <video id="heroVideo" autoplay loop muted playsinline preload="auto">
    <source src="hero.mp4" type="video/mp4">
  </video>

  <script>
    const video = document.getElementById('heroVideo');
    video.muted = true;
    video.volume = 0;

    // Tenta imediatamente ao parsear o script
    video.play();

    // Tenta novamente no DOMContentLoaded
    document.addEventListener('DOMContentLoaded', () => {
      video.play();
    });

    // Tenta novamente quando a janela carrega
    window.addEventListener('load', () => {
      video.play();
    });

    // Tenta quando o vídeo estiver pronto para tocar
    video.addEventListener('canplay', () => {
      video.play();
    });

    // Tenta via Intersection Observer (quando o elemento fica visível)
    if ('IntersectionObserver' in window) {
      const observer = new IntersectionObserver((entries) => {
        entries.forEach(entry => {
          if (entry.isIntersecting) {
            video.play();
          }
        });
      }, { threshold: 0.1 });
      observer.observe(video);
    }
  </script>
</body>
</html>
