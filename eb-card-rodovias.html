<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Card Rodovias Federais</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    width: 100%;
    height: 100%;
    background: transparent;
    font-family: 'Avenir Next', 'Avenir', 'Century Gothic', 'Trebuchet MS', sans-serif;
  }

  .card {
    position: relative;
    width: 100%;
    height: 100vh;
    border-radius: 20px;
    overflow: hidden;
    padding: 14px 20px 16px;
    border: 1px solid rgba(255,255,255,0.07);
    background: #0d1014;
    display: flex;
    flex-direction: column;
    justify-content: flex-start;
    cursor: default;
    transition: border-color 0.3s ease;
  }

  .card:hover { border-color: rgba(255,255,255,0.14); }

  .blob {
    position: absolute;
    border-radius: 50%;
    pointer-events: none;
    z-index: 0;
  }

  .blob-main {
    bottom: -20%;
    right: -10%;
    width: 65%;
    height: 75%;
    background: radial-gradient(ellipse, rgba(94,108,120,0.80) 0%, rgba(94,108,120,0.28) 42%, transparent 70%);
    filter: blur(28px);
  }

  .blob-accent {
    top: 5%;
    right: 22%;
    width: 36%;
    height: 45%;
    background: radial-gradient(ellipse, rgba(148,168,184,0.28) 0%, transparent 70%);
    filter: blur(18px);
  }

  .star {
    position: absolute;
    border-radius: 50%;
    background: #fff;
    z-index: 1;
    animation: twinkle 3s ease-in-out infinite;
  }

  @keyframes twinkle {
    0%, 100% { opacity: 0.3; transform: scale(1); }
    50%       { opacity: 1;   transform: scale(1.5); }
  }

  .card-content { position: relative; z-index: 2; }

  .card-title {
    font-family: 'Avenir Next', 'Avenir', 'Century Gothic', 'Trebuchet MS', sans-serif;
    font-size: 20px;
    font-weight: 700;
    color: #ffffff;
    letter-spacing: 0.04em;
    line-height: 1.2;
    text-transform: uppercase;
  }
</style>
</head>
<body>
<div class="card">
  <div class="blob blob-main"></div>
  <div class="blob blob-accent"></div>
  <div class="star" style="width:3px;height:3px;top:20px;right:46px;animation-delay:0s;"></div>
  <div class="star" style="width:2px;height:2px;top:48px;right:84px;animation-delay:1.1s;"></div>
  <div class="star" style="width:2px;height:2px;top:34px;right:120px;animation-delay:0.5s;"></div>
  <div class="card-content">
    <h1 class="card-title">Rodovias Federais</h1>
  </div>
</div>
</body>
</html>
